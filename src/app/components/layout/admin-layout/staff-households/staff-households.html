<div class="households-container">
  <h2>Households</h2>

  <div class="filters">
    <input
      type="text"
      placeholder="Search by Household ID or Address"
      [(ngModel)]="search"
    />

    <select [(ngModel)]="purok">
      <option value="">Purok</option>
      <option value="1">Purok 1</option>
      <option value="2">Purok 2</option>
      <option value="3">Purok 3</option>
    </select>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Household ID</th>
          <th>Head of Household</th>
          <th>Address</th>
          <th>Purok</th>
          <th>Members</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td colspan="7" class="no-data">
            No households found
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
