<div class="wrapper">

  <div class="container">
    <h2>Request Certificate</h2>

    <form (ngSubmit)="submitRequest()" #requestForm="ngForm">

      <div class="form-group">
        <label>Types of Certificate</label>
        <select
          name="certificateType"
          [(ngModel)]="formData.certificateType"
          required
        >
          <option value="Barangay Clearance">Barangay Clearance</option>
          <option value="Certificate of Residency">Certificate of Residency</option>
          <option value="Request for Clearance">Request for Clearance</option>
        </select>
      </div>

      <div class="form-group">
        <label>Purpose</label>
        <textarea
          name="purpose"
          [(ngModel)]="formData.purpose"
          required
          rows="3"
          placeholder=" e.g. For employment purposes"
        ></textarea>
      </div>

      <button type="submit">Submit Request</button>
    </form>
  </div>

  <div class="requests-panel">
    <h3>My Requests</h3>

    <div *ngIf="requests.length === 0" class="empty">
      No requests yet
    </div>

<div class="request-card" *ngFor="let r of requests">

  <p><strong>Type:</strong> {{ r.certificateType }}</p>
  <p><strong>Purpose:</strong> {{ r.purpose }}</p>

  <div class="status-row">

    <span 
      class="status-badge"
      [ngClass]="{
        'pending': r.status === 'Pending',
        'approved': r.status === 'Approved',
        'rejected': r.status === 'Rejected'
      }">
      {{ r.status }}
    </span>

    <button class="status-btn" (click)="goToRequest()">See Status</button>

  </div>

</div>
