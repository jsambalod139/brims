<div class="requests-container">
  <h2>Requests</h2>
  <p class="subtitle">Manage and review submitted service requests.</p>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Purpose</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngIf="requests.length === 0">
          <td colspan="5" class="no-data">
            No requests available
          </td>
        </tr>

        <tr *ngFor="let req of requests">
          <td>{{ req.certificateType }}</td>
          <td>{{ req.purpose }}</td>

          <td>
            <span 
              [ngClass]="{
                'pending': req.status === 'Pending',
                'approved': req.status === 'Approved',
                'rejected': req.status === 'Rejected'
              }">
              {{ req.status }}
            </span>
          </td>

          <td>{{ req.date }}</td>

          <td class="actions">
            <button 
              class="approve-btn"
              (click)="approve(req.id!)"
              [disabled]="req.status !== 'Pending'">
              Approve
            </button>

            <button 
              class="reject-btn"
              (click)="reject(req.id!)"
              [disabled]="req.status !== 'Pending'">
              Reject
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
