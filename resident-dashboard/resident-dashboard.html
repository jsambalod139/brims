<div class="dashboard-container">
  <h2 class="welcome-text">Welcome, {{ residentName }}</h2>
    <div class="cards">
      <div class="card profile-card" (click)="goToProfile()">
        <i class="pi pi-user"></i>
        <p>My Profile</p>
  </div>

  <div class="card certificate-card" (click)="goToCertificate()">
        <i class="pi pi-file"></i>
        <p>Request Certificate</p>
    </div>

    <div class="card request-card" (click)="goToRequests()">
      <i class="pi pi-clipboard"></i>
      <p>My Requests</p>
    </div>

  </div>

  <div class="request-header">
    <h3>My Requests</h3>
    
  <div class="status-filter">
    <label>Status:</label>
    <select [(ngModel)]="selectedStatus">
      <option value="All">All</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
    </select>
  </div>
  </div>

  <div class="table-card">

    <table *ngIf="filteredRequests.length > 0">
      <thead>
        <tr>
          <th>Type</th>
          <th>Purpose</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let req of filteredRequests">
          <td>{{ req.certificateType }}</td>
          <td>{{ req.purpose }}</td>

          <td>
            <span 
              [ngClass]="{
                'approved': req.status === 'Approved',
                'pending': req.status === 'Pending',
                'rejected': req.status === 'Rejected'
              }">
              {{ req.status }}
            </span>
          </td>

          <td>{{ req.date }}</td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="requests.length === 0" class="no-data">
      No requests yet
    </div>

  </div>

</div>
